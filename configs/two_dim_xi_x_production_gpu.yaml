# FULL production configuration for the torch ABF-FR backend (xi(x, y) = x).
# This is the intended production experiment.  DO NOT run locally.  Transfer the
# repo to a remote GPU (A100/G4) and launch via scripts/run_full_gpu_study.sh
# with --yes-production.  Outputs go to results/two_dim_xi_x/production_gpu/.
experiment_name: two_dim_xi_x
output_root: results/two_dim_xi_x
backend: torch
device: cuda
dtype: float32
batch_size_configs: 32

domain:
  x_min: -3.0
  x_max: 3.0
  y_min: -2.5
  y_max: 3.5
  nx_ref: 801         # (added) used by run_reference_2d.py
  ny_ref: 801         # (added) y-quadrature nodes for the reference profiles
  nx_profile: 401

simulation:
  beta: 4.0
  dt: 0.002
  n_particles: 1000
  n_steps: 100000
  eval_every: 1000
  seeds: [0, 1, 2, 3, 4]
  x_init_mode: mixed
  y_init_mode: mixed

abf:
  estimator: binned_smooth
  h: 0.05
  update_every: 10
  min_count: 1.0
  ema_alpha: 0.05

fr:
  enabled: true
  target_types: ["estimated", "uniform", "oracle"]
  gamma_values: [0.01, 0.02, 0.05, 0.1]
  eta_values: [0.075, 0.10, 0.15]
  burnin_fractions: [0.0, 0.2, 0.4]
  ramp_fraction: 0.1
  fr_every_values: [5]
  score_clip: 5.0
  max_event_fraction: 0.10
  target_ema_alpha: 0.05
  jitter: 0.0

methods:
  - abf_only
  - abf_fr_estimated
  - abf_fr_uniform
  - abf_fr_oracle
