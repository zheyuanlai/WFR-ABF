# Smoke configuration for the GPU/torch ABF-FR backend (xi(x, y) = x).
# Tiny, fast settings to exercise the GPU pipeline end-to-end LOCALLY (CPU torch
# if CUDA is unavailable).  Outputs of `--stage tuning_gpu` go to
# results/two_dim_xi_x/tuning_gpu/.  Do NOT use for science.
experiment_name: two_dim_xi_x
output_root: results/two_dim_xi_x
backend: torch
device: cuda          # falls back to CPU torch locally when CUDA is absent
dtype: float32
batch_size_configs: 4

domain:
  x_min: -3.0
  x_max: 3.0
  y_min: -2.5
  y_max: 3.5
  nx_ref: 601         # (added) used by run_reference_2d.py for the 2D ref grid
  ny_ref: 601         # (added) y-quadrature nodes for the reference profiles
  nx_profile: 301

simulation:
  beta: 4.0
  dt: 0.002
  n_particles: 300
  n_steps: 5000
  eval_every: 500
  seeds: [0, 1]
  x_init_mode: mixed
  y_init_mode: mixed

abf:
  estimator: binned_smooth
  h: 0.05
  update_every: 10
  min_count: 1.0
  ema_alpha: 0.05

fr:
  enabled: true
  target_types: ["estimated", "uniform", "oracle"]
  gamma_values: [0.01, 0.02]
  eta_values: [0.10]
  burnin_fractions: [0.0, 0.2]
  ramp_fraction: 0.1
  fr_every_values: [5]
  score_clip: 5.0
  max_event_fraction: 0.10
  target_ema_alpha: 0.05
  jitter: 0.0           # default: no jitter on cloned particles

methods:
  - abf_only
  - abf_fr_estimated
  - abf_fr_uniform
  - abf_fr_oracle
